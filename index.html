<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A beautiful Hello, World! page">
  <title>Hello, World!</title>
  <style>
    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: #fff;
      background:
        radial-gradient(circle at 18% 20%, rgba(129, 92, 246, .48), transparent 34%),
        radial-gradient(circle at 82% 76%, rgba(0, 214, 201, .34), transparent 32%),
        linear-gradient(135deg, #090b1a 0%, #15112c 52%, #061923 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 24rem;
      aspect-ratio: 1;
      border-radius: 50%;
      filter: blur(2px);
      opacity: .55;
      animation: float 9s ease-in-out infinite;
    }

    body::before {
      top: -12rem;
      right: -7rem;
      background: linear-gradient(145deg, #8b5cf6, #ec4899);
    }

    body::after {
      bottom: -14rem;
      left: -6rem;
      background: linear-gradient(145deg, #22d3ee, #10b981);
      animation-delay: -4.5s;
    }

    main {
      position: relative;
      z-index: 1;
      padding: clamp(2rem, 8vw, 6rem);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.3rem, 13vw, 9.5rem);
      font-weight: 850;
      line-height: .95;
      letter-spacing: -.075em;
      background: linear-gradient(110deg, #fff 10%, #c4b5fd 42%, #67e8f9 72%, #fff 96%);
      background-size: 220% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 14px 35px rgba(124, 58, 237, .35));
      animation: shine 5s linear infinite, arrive 900ms cubic-bezier(.16, 1, .3, 1) both;
    }

    p {
      margin: 1.5rem 0 0;
      font-size: clamp(.8rem, 1.6vw, 1.05rem);
      letter-spacing: .38em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .58);
      animation: arrive 900ms 180ms cubic-bezier(.16, 1, .3, 1) both;
    }

    @keyframes shine { to { background-position: -220% center; } }
    @keyframes float { 50% { transform: translateY(2rem) scale(1.08); } }
    @keyframes arrive {
      from { opacity: 0; transform: translateY(28px) scale(.96); }
      to { opacity: 1; transform: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello, World!</h1>
    <p>Nice to meet you</p>
  </main>
</body>
</html>
